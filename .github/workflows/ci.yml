name: CI

# Task #30 — automate the test suite so the WARP/* merge route can
# refuse to merge a branch whose tests don't pass.
#
# Runs on every push to any branch and on every pull request. The
# `test` job's check name is what `src/lib/pr-gates.ts` consults via
# `getPRCheckStatus("test", ...)` — KEEP the job key in sync.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  # One run per branch / PR — newer pushes cancel older in-flight runs
  # so the merge gate sees the latest status quickly.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test
